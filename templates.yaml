    # Outdoor Heat Index
    - name: "Outdoor Heat Index"
      unique_id: outdoor_heat_index
      unit_of_measurement: "°F"
      availability: >-
        {{ states('sensor.outdoor_rh_from_dewpoint') not in ['unknown', 'unavailable']
           and states('sensor.outdoor_temp') not in ['unknown', 'unavailable'] }}
      state: >-
        {% set T = states('sensor.outdoor_temp') | float(0) %}
        {% set RH = states('sensor.outdoor_rh_from_dewpoint') | float(0) %}
        {% set HI = -42.379 + 2.04901523*T + 10.14333127*RH
           - 0.22475541*T*RH - 0.00683783*T*T
           - 0.05481717*RH*RH + 0.00122874*T*T*RH
           + 0.00085282*T*RH*RH - 0.00000199*T*T*RH*RH %}
        {{ HI | round(1) }}

