    # Window Recommendation (legacy - room 1 only)
    - name: "Window Recommendation"
      unique_id: window_recommendation
      state: >-
        {% set out_hi = states('sensor.outdoor_heat_index') | float(0) %}
        {% set in_hi = states('sensor.indoor_1_heat_index') | float(0) %}
        {% set out_dp = states('sensor.outdoor_dewpoint') | float(0) %}
        {% set in_dp = states('sensor.indoor_1_dewpoint') | float(0) %}
        {% if out_hi < in_hi - 2 %}{% if out_dp < in_dp + 3 %}Open windows — outside feels cooler and drier{% else %}Run A/C — outside cooler but too humid{% endif %}{% elif out_hi > in_hi + 2 %}Close windows — outside warmer than inside{% else %}Neutral — no strong reason to change{% endif %}

    # Room 1 Comfort State
    - name: "Room 1 Comfort State"
      unique_id: room_1_comfort_state
      availability: >-
        {{ states('sensor.indoor_1_heat_index') not in ['unknown', 'unavailable'] }}
      state: >-
        {% set hi = states('sensor.indoor_1_heat_index') | float(0) %}{% set center = states('input_number.comfort_hi_center') | float(72) %}{% set range = states('input_number.comfort_hi_range') | float(4) %}{% set tolerance = states('input_number.comfort_hi_tolerance') | float(3) %}{% set lower = center - range %}{% set upper = center + range %}{% set lower_tol = lower - tolerance %}{% set upper_tol = upper + tolerance %}{{ 'uncomfortable_cold' if hi < lower_tol else 'less_comfortable_cold' if hi < lower else 'comfortable' if hi <= upper else 'less_comfortable_warm' if hi <= upper_tol else 'uncomfortable_warm' }}

