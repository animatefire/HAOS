    # Outdoor RH from Dewpoint
    - name: "Outdoor RH from Dewpoint"
      unique_id: outdoor_rh_from_dewpoint
      unit_of_measurement: "%"
      availability: >-
        {{ states('sensor.outdoor_dewpoint') not in ['unknown', 'unavailable']
           and states('sensor.outdoor_temp') not in ['unknown', 'unavailable'] }}
      state: >-
        {% set T = (states('sensor.outdoor_temp') | float(0) - 32) * 5/9 %}
        {% set Td = (states('sensor.outdoor_dewpoint') | float(0) - 32) * 5/9 %}
        {{ (100 * (2.718281828 ** (17.625 * Td / (243.04 + Td))) / (2.718281828 ** (17.625 * T / (243.04 + T)))) | round(1) }}

