    # House Comfort Aggregate
    - name: "House Comfort Aggregate"
      unique_id: house_comfort_aggregate
      state: >-
        {% set state_map = {'uncomfortable_cold': -2, 'less_comfortable_cold': -1, 'comfortable': 0, 'less_comfortable_warm': 1, 'uncomfortable_warm': 2} %}
        {% set ns = namespace(total=0, count=0) %}
        {% for i in range(1, 7) %}
          {% set s = states('sensor.room_' ~ i ~ '_comfort_state') %}
          {% if s in state_map %}
            {% set ns.total = ns.total + state_map[s] %}
            {% set ns.count = ns.count + 1 %}
          {% endif %}
        {% endfor %}
        {% if ns.count == 0 %}unavailable{% else %}{% set avg = ns.total / ns.count %}{{ 'uncomfortable_cold' if avg <= -1.5 else 'less_comfortable_cold' if avg <= -0.5 else 'comfortable' if avg <= 0.5 else 'less_comfortable_warm' if avg <= 1.5 else 'uncomfortable_warm' }}{% endif %}