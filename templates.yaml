- sensor:
    # Outdoor Dewpoint
    - name: "Outdoor Dewpoint"
      unique_id: outdoor_dewpoint
      unit_of_measurement: "°F"
      availability: >-
        {{ states('sensor.outdoor_temp') not in ['unknown', 'unavailable']
           and states('sensor.outdoor_humidity') not in ['unknown', 'unavailable'] }}
      state: >-
        {% set T = (states('sensor.outdoor_temp') | float(0) - 32) * 5/9 %}
        {% set RH = states('sensor.outdoor_humidity') | float(0) %}
        {% set a = 17.27 %}
        {% set b = 237.7 %}
        {% set alpha = ((a * T) / (b + T)) + (RH / 100.0) | log %}
        {{ (((b * alpha) / (a - alpha)) * 9/5 + 32) | round(1) }}

